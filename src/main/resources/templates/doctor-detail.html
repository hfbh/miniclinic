<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${doctor.name} + ' - MiniClinic'"></title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; }
        nav { background: #0F2443; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        .card { background: #F8FAFC; padding: 24px; border-left: 5px solid #14B8A6; border-radius: 4px; }
        dt { font-weight: bold; color: #0F2443; margin-top: 12px; }
        .back { display: inline-block; margin-top: 20px; color: #14B8A6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>醫師詳細資訊</h1>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>
    </nav>
    
    <div class="card">
        <dl>
            <dt>醫師編號</dt><dd th:text="${doctor.doctorId}"></dd>
            <dt>姓名</dt><dd th:text="${doctor.name}"></dd>
            <dt>科別</dt><dd th:text="${doctor.department}"></dd>
            <dt>專長</dt><dd th:text="${doctor.specialty}"></dd>
        </dl>
    </div>
    <a th:href="@{/doctors}" class="back">← 返回清單</a>
</body>
</html>
