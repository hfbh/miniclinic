<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        h1 { color: #0F2443; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #334155; }
        input[type="password"] { width: 100%; padding: 10px; border: 1px solid #CBD5E1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #14B8A6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0D9488; }
        .alert-danger { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-weight: bold; text-align: center; }
        .alert-success { background: #DCFCE7; color: #166534; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-weight: bold; text-align: center; }
        .nav-link { display: block; text-align: center; margin-top: 20px; color: #64748B; text-decoration: none; }
        .nav-link:hover { color: #0F2443; }
    </style>
</head>
<body>

    <h1>修改密碼</h1>
    <p style="text-align: center;">當前醫師：<span th:text="${loggedInDoctorName}">醫師姓名</span></p>

    <div class="alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">錯誤訊息</div>
    
    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}">成功訊息</div>

    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="form-group">
            <label for="oldPassword">舊密碼</label>
            <input type="password" th:field="*{oldPassword}" required />
        </div>
        
        <div class="form-group">
            <label for="newPassword">新密碼 (至少 8 碼)</label>
            <input type="password" th:field="*{newPassword}" required />
        </div>
        
        <div class="form-group">
            <label for="confirmPassword">確認新密碼</label>
            <input type="password" th:field="*{confirmPassword}" required />
        </div>
        
        <button type="submit">確認修改</button>
    </form>

    <a class="nav-link" th:href="@{/dashboard}">← 回醫師主頁</a>

</body>
</html>
