# ===============================
# SQLite 資料庫連線設定
# ===============================
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:miniclinic.db

# ===============================
# JPA / Hibernate 設定
# ===============================
# 指定 SQLite 的方言，讓 Hibernate 知道如何翻譯 SQL 語法
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# 讓系統啟動時，自動根據 Entity (@Table) 更新或建立資料表
spring.jpa.hibernate.ddl-auto=update

# 在終端機顯示執行時背後產生的 SQL 語法，並將其排版 (方便開發與除錯)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 資料庫初始化設定 (data.sql 相關)
# ===============================
# 設定讀取 SQL 檔案的編碼，避免中文資料變亂碼
spring.sql.init.encoding=UTF-8

# 確保 Hibernate 先把資料表 (Table) 建好之後，才執行 data.sql 塞入資料
spring.jpa.defer-datasource-initialization=true

# 每次啟動都會強制執行初始化腳本 (data.sql)
spring.sql.init.mode=always